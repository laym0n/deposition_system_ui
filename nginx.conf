server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing support
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Aggressive caching for static assets (webpack uses content hashes in prod)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
